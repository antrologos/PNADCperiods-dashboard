name: sidra-daily

# Schedule: 15:00 UTC = 12:00 BRT (3h after the typical IBGE SIDRA refresh).
# Manual trigger available via the Actions tab ("Run workflow").
on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write          # required for piggyback uploads to releases

concurrency:
  group: sidra-daily
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    # Plan target: 15 min. Bumped to 20 to absorb first-run pak cache miss
    # without panicking; lower this back to 15 once the cache is warm.
    timeout-minutes: 20

    env:
      ACTIONS_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup R (pinned 4.5)
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5"
          use-public-rspm: true

      - name: Install R packages (extras only, no DESCRIPTION deps)
        # `packages: sessioninfo` overrides the action default
        # `deps::., any::sessioninfo` so DESCRIPTION is never read.
        # Bare names (no `any::` prefix) resolve via CRAN + RSPM cleanly;
        # pak's `any::` prefix tripped over `qs` resolution on noble binary.
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: sessioninfo
          extra-packages: |
            PNADCperiods
            piggyback
            qs
            jsonlite
            data.table
            seasonal
            forecast
            httr2
            x13binary
          cache-version: 1

      - name: Rotate data-latest -> data-prev (only if previous run was healthy)
        # Pulls the previous run's sidra_log.json, refuses to rotate if
        # status != "success"/"partial" (avoids propagating a half-written
        # release into data-prev). On the very first run data-latest has
        # no assets and the rotation is a no-op.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p prev_assets
          # 1. Try to fetch only the previous log.
          set +e
          gh release download data-latest \
            --repo "$GITHUB_REPOSITORY" \
            --dir prev_assets \
            --pattern "sidra_log.json" --clobber
          dl_rc=$?
          set -e
          if [ ! -f prev_assets/sidra_log.json ]; then
            echo "No previous sidra_log.json (rc=$dl_rc); first run or empty release. Skipping rotation."
            exit 0
          fi
          prev_status=$(jq -r '.status // "missing"' prev_assets/sidra_log.json)
          echo "Previous data-latest status: $prev_status"
          if [ "$prev_status" != "success" ] && [ "$prev_status" != "partial" ]; then
            echo "Refusing to rotate a non-healthy release."
            exit 0
          fi
          # 2. Healthy: pull all .qs and rotate.
          gh release download data-latest \
            --repo "$GITHUB_REPOSITORY" \
            --dir prev_assets \
            --pattern "*.qs" --clobber
          if [ -z "$(ls prev_assets/*.qs 2>/dev/null)" ]; then
            echo "No .qs assets in previous release; nothing to rotate."
            exit 0
          fi
          if ! gh release view data-prev --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create data-prev \
              --repo "$GITHUB_REPOSITORY" \
              --prerelease \
              --title "Previous SIDRA cache (rotated)" \
              --notes "Auto-rotated by sidra-daily.yml. Holds the previous data-latest snapshot."
          fi
          for f in prev_assets/*; do
            gh release upload data-prev "$f" \
              --repo "$GITHUB_REPOSITORY" --clobber
          done

      - name: Run fetch script
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: Rscript .github/scripts/fetch_sidra_daily.R

      - name: Summarize log in run summary
        if: always()
        run: |
          if [ -f output/sidra_log.json ]; then
            {
              echo "## SIDRA daily fetch log"
              echo
              echo '~~~json'
              cat output/sidra_log.json
              echo
              echo '~~~'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No sidra_log.json produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Weekly snapshot (Mondays only, immutable)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if [ "$(date -u +%u)" != "1" ]; then
            echo "Not Monday (UTC); skipping weekly snapshot."
            exit 0
          fi
          # %G = ISO week-numbering year (matches %V); avoids edge-of-year mismatch
          week_tag="data-snapshot-$(date -u +%G-W%V)"
          echo "Creating immutable weekly snapshot: $week_tag"
          if gh release view "$week_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Tag $week_tag already exists; refusing to overwrite (snapshots are immutable)."
            exit 0
          fi
          gh release create "$week_tag" \
            --repo "$GITHUB_REPOSITORY" \
            --prerelease \
            --title "SIDRA snapshot $week_tag" \
            --notes "Auto-snapshot by sidra-daily.yml on $(date -u +%Y-%m-%d). Immutable."
          for f in output/series_metadata.qs output/rolling_quarters.qs \
                   output/monthly_sidra.qs output/deseasonalized_cache.qs \
                   output/sidra_log.json; do
            if [ -f "$f" ]; then
              gh release upload "$week_tag" "$f" --repo "$GITHUB_REPOSITORY"
            fi
          done
